services:
  db:
    image: pgvector/pgvector:0.6.0-pg16
    container_name: gem_reader_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gem_reader
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gem_reader"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: gem_reader_app
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/gem_reader
      GCP_PROJECT_ID: gem-reader
      GCP_LOCATION: asia-south1
      GCP_ENDPOINT_ID: mg-endpoint-25701b72-8e96-47d7-a08c-c9856ada9301
      GOOGLE_APPLICATION_CREDENTIALS: /app/resources/gem-reader-1cd59f64b28d.json
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ..:/app
      - ../service-account.json:/app/service-account.json
    command: python app.py

volumes:
  postgres_data: